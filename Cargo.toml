[package]
name = "transcriber"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
eframe = "0.27"
egui_plot = "0.27"
egui-phosphor = "0.5"
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "gif", "bmp", "webp"] }
rfd = "0.14"
rodio = "0.19"
rustfft = "6.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
blake3 = "1.5"
zstd = "0.13"
symphonia = { version = "0.5", features = ["aac", "flac", "isomp4", "mp3", "ogg", "pcm", "vorbis", "wav"] }
signalsmith-stretch = "0.1.3"

# HFSFormer pipeline dependencies
ort = "2.0.0-rc.12"
ndarray = "0.16"
ndarray-stats = "0.5"
crossbeam-channel = "0.5"
parking_lot = "0.12"
rayon = "1.9"
thiserror = "1.0"
