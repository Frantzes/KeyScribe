name: Release Bundles And Installers

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }} bundle
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            artifact_glob: build/windows/*.zip
          - os: macos-14
            name: macos-arm64
            target: aarch64-apple-darwin
            artifact_glob: |
              # build/macos/transcriber-macos-arm64*.zip
              build/macos/transcriber-macos-arm64*.dmg
              # build/macos/transcriber-macos-arm64*.pkg
          - os: macos-14
            name: macos-x64
            target: x86_64-apple-darwin
            artifact_glob: |
              # build/macos/transcriber-macos-x64*.zip
              build/macos/transcriber-macos-x64*.dmg
              # build/macos/transcriber-macos-x64*.pkg
          - os: ubuntu-latest
            name: linux
            artifact_glob: build/linux/*.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: matrix.name == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libudev-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libgtk-3-dev

      - name: Build Windows bundle
        if: matrix.name == 'windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/build-windows.ps1

      - name: Build macOS bundle
        if: startsWith(matrix.name, 'macos-')
        shell: bash
        env:
          APP_VERSION: ${{ github.ref_name }}
          DMG_ONLY: "1"
        run: |
          rustup target add ${{ matrix.target }}
          chmod +x scripts/build-macos.sh
          ./scripts/build-macos.sh --target ${{ matrix.target }}

      - name: Build Linux bundle
        if: matrix.name == 'linux'
        shell: bash
        run: |
          chmod +x scripts/build-linux.sh
          ./scripts/build-linux.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: portable-${{ matrix.name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          fi

          shopt -s nullglob
          assets=(release-assets/*)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets found in release-assets/."
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" --generate-notes
          fi
