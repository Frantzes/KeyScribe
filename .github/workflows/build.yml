name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  ASSETS_URL: https://github.com/Frantzes/KeyScribe/releases/download/assets-v1

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: v${{ steps.cargo-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: cargo-version
        run: echo "version=$(awk -F'\"' '/^version[[:space:]]*=/{print $2; exit}' Cargo.toml)" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: [version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache ONNX models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: models/
          key: onnx-models-v1

      - name: Download ONNX models
        if: steps.cache-models.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path models -Force | Out-Null
          foreach ($m in @("htdemucs_6s.onnx", "beat_this_small.onnx", "mel_spectrogram.onnx")) {
            Invoke-WebRequest -Uri "$env:ASSETS_URL/$m" -OutFile "models/$m" -UseBasicParsing
          }

      - name: Cache vendor DLLs
        id: cache-vendor
        uses: actions/cache@v4
        with:
          path: |
            vendor/onnxruntime/
            vendor/ort-gpu/
            vendor/cudnn/
          key: vendor-dlls-v1

      - name: Download vendor DLLs
        if: steps.cache-vendor.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path vendor/onnxruntime -Force | Out-Null
          foreach ($dll in @("onnxruntime.dll", "DirectML.dll")) {
            Invoke-WebRequest -Uri "$env:ASSETS_URL/$dll" -OutFile "vendor/onnxruntime/$dll" -UseBasicParsing
          }

      - name: Build
        run: cargo build --release

      - name: Package portable zip
        shell: pwsh
        run: scripts/build-windows.ps1 -SkipCargoBuild

      - uses: actions/upload-artifact@v4
        with:
          name: keyscribe-windows
          path: build/windows/keyscribe-windows-x64/

  build-linux:
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache ONNX models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: models/
          key: onnx-models-v1

      - name: Download ONNX models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          for m in htdemucs_6s.onnx beat_this_small.onnx mel_spectrogram.onnx; do
            curl -fL "${{ env.ASSETS_URL }}/$m" -o "models/$m"
          done

      - name: Build
        run: cargo build --release

      - name: Package portable zip
        run: bash scripts/build-linux.sh --skip-cargo-build

      - uses: actions/upload-artifact@v4
        with:
          name: keyscribe-linux
          path: build/linux/

  build-macos:
    needs: [version]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache ONNX models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: models/
          key: onnx-models-v1

      - name: Download ONNX models
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          for m in htdemucs_6s.onnx beat_this_small.onnx mel_spectrogram.onnx; do
            curl -fL "${{ env.ASSETS_URL }}/$m" -o "models/$m"
          done

      - name: Build
        run: cargo build --release

      - name: Package portable zip
        run: bash scripts/build-macos.sh --skip-cargo-build --portable-only

      - uses: actions/upload-artifact@v4
        with:
          name: keyscribe-macos
          path: build/macos/

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Zip each platform bundle
        run: |
          cd keyscribe-windows && zip -r ../keyscribe-windows-x64.zip . && cd ..
          cd keyscribe-linux && zip -r ../keyscribe-linux-x64.zip . && cd ..
          cd keyscribe-macos && zip -r ../keyscribe-macos-arm64.zip . && cd ..

      - name: Create Release
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          if gh release view "$TAG" --json tagName 2>/dev/null; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" \
              keyscribe-windows-x64.zip \
              keyscribe-linux-x64.zip \
              keyscribe-macos-arm64.zip \
              --title "$TAG" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
